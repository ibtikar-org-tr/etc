name: (main) [backend] Deploy to Cloudflare Workers

on:
  push:
    branches:
      - main
    paths:
      - 'backend/**'
      - '.github/workflows/backend.yml'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: main
    defaults:
      run:
        working-directory: ./backend
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 20

      - name: Install project dependencies
        run: npm install

      - name: Install Wrangler
        run: npm install -g wrangler

      - name: Update wrangler config with environment variables
        run: |
          jq_filter='.d1_databases[0].database_id = $dbid0
          | .d1_databases[0].database_name = $dbname0
          | .d1_databases[1].database_id = $dbid1
          | .d1_databases[1].database_name = $dbname1
          | .vars.ETC_2026_EVENT_ID = $etc2026EventId
          | .vars.FRONTEND_BASE_URL = $frontendBaseUrl
          | .vars.ETC_GOOGLE_SHEET_ID = $googleSheetId
          | .vars.ETC_GOOGLE_SHEET_RANGE = $googleSheetRange'

          jq \
            --arg dbid0 "${{ vars.MEMBERS_DB_ID }}" \
            --arg dbname0 "${{ vars.MEMBERS_DB_NAME }}" \
            --arg dbid1 "${{ vars.VMS_DB_ID }}" \
            --arg dbname1 "${{ vars.VMS_DB_NAME }}" \
            --arg frontendBaseUrl "${{ vars.FRONTEND_BASE_URL }}" \
            --arg etc2026EventId "${{ vars.ETC_2026_EVENT_ID }}" \
            --arg googleSheetId "${{ vars.ETC_GOOGLE_SHEET_ID }}" \
            --arg googleSheetRange "${{ vars.ETC_GOOGLE_SHEET_RANGE }}" \
            "$jq_filter" \
            wrangler.jsonc > wrangler.local.jsonc

      - name: Deploy to Cloudflare Workers
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: wrangler deploy --config wrangler.local.jsonc

      - name: Set secrets in Worker
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: |
          echo '${{ secrets.GOOGLE_API_KEY }}' > GOOGLE_API.json
          wrangler secret put GOOGLE_API_KEY --config wrangler.local.jsonc < GOOGLE_API.json
          rm GOOGLE_API.json